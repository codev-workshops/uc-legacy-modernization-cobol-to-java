spring:
  application:
    name: carddemo-transaction-service
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: localhost
    port: 5672
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

carddemo:
  account-service:
    url: http://localhost:8082
  batch:
    output-dir: ${java.io.tmpdir}/carddemo-test-output
    chunk-size: 10

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
