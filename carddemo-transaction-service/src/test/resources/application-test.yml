spring:
  application:
    name: carddemo-transaction-service
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: localhost
    port: 5672

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
