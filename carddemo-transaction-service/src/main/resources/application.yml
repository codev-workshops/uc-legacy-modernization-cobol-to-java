spring:
  application:
    name: carddemo-transaction-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5443}/${DB_NAME:carddemo_transaction_db}
    username: ${DB_USER:carddemo}
    password: ${DB_PASSWORD:carddemo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,batch

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

carddemo:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
  batch:
    output-dir: ${BATCH_OUTPUT_DIR:output}
    chunk-size: 100

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3

logging:
  level:
    com.carddemo: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: staging
  jpa:
    show-sql: false

logging:
  level:
    com.carddemo: INFO

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    com.carddemo: WARN
