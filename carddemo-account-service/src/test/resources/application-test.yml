spring:
  application:
    name: carddemo-account-service
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  rabbitmq:
    host: localhost
    port: 5672

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
