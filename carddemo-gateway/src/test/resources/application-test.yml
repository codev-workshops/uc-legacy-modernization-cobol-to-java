spring:
  application:
    name: carddemo-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes: []

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

jwt:
  secret: ThisIsADefaultSecretKeyForDevelopmentThatIs64BytesLongAtLeast!!
  access-token-expiration: 900000

gateway:
  rate-limit:
    requests-per-minute: 100
  cors:
    allowed-origins: http://localhost:3000
