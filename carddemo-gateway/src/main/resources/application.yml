spring:
  application:
    name: carddemo-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/accounts/**,/api/cards/**,/api/card-xref/**,/api/customers/**,/api/batch/**
        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/transactions/**,/api/reports/**,/api/transaction-types/**,/api/transaction-categories/**
        - id: authorization-service
          uri: ${AUTHORIZATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/authorizations/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
  main:
    web-application-type: reactive

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

jwt:
  secret: ${JWT_SECRET:ThisIsADefaultSecretKeyForDevelopmentThatIs64BytesLongAtLeast!!}
  access-token-expiration: 900000

gateway:
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_RPM:100}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.carddemo: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: staging

logging:
  level:
    com.carddemo: INFO

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.carddemo: WARN
