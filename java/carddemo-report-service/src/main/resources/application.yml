server:
  port: 8085

spring:
  application:
    name: carddemo-report-service
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo?currentSchema=transaction
    username: carddemo
    password: carddemo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

feign:
  account-service:
    url: http://localhost:8082
  transaction-service:
    url: http://localhost:8083
