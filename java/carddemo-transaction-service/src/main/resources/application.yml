server:
  port: 8083

spring:
  application:
    name: carddemo-transaction-service
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo?currentSchema=transaction
    username: carddemo
    password: carddemo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    schemas: transaction
