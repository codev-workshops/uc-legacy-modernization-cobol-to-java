spring:
  application:
    name: carddemo-migration
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo
    username: carddemo
    password: carddemo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
