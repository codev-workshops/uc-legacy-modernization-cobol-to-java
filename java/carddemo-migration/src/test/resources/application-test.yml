spring:
  datasource:
    url: jdbc:h2:mem:migrationdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: false
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
