server:
  port: 8082

spring:
  application:
    name: carddemo-account-service
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo?currentSchema=account
    username: carddemo
    password: carddemo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    schemas: account
