server:
  port: 8084

spring:
  application:
    name: carddemo-batch-service
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo?currentSchema=account
    username: carddemo
    password: carddemo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  batch:
    jdbc:
      initialize-schema: always

feign:
  account-service:
    url: http://localhost:8082
