server:
  port: 8080

spring:
  application:
    name: carddemo-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: users-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: accounts-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/accounts/**
        - id: cards-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/cards/**
        - id: customers-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/customers/**
        - id: transactions-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/transactions/**
        - id: billing-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/billing/**
        - id: batch-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/batch/**
        - id: reports-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/reports/**

jwt:
  secret: carddemo-default-secret-key-for-development-only
