spring:
  application:
    name: carddemo-authorization-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:carddemo_authz_db}
    username: ${DB_USER:carddemo}
    password: ${DB_PASSWORD:carddemo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

server:
  port: 8084

carddemo:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
  auth-purge:
    days-threshold: ${AUTH_PURGE_DAYS:90}

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.carddemo: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: staging
  jpa:
    show-sql: false

logging:
  level:
    com.carddemo: INFO

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    com.carddemo: WARN
