spring:
  application:
    name: carddemo-authorization-service
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: localhost
    port: 5672
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

server:
  port: 0

carddemo:
  account-service:
    url: http://localhost:${wiremock.server.port:8089}
  auth-purge:
    days-threshold: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 1s
