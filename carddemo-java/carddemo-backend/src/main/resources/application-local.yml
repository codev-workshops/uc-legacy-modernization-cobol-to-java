spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo
    username: ${CARDDEMO_DB_USER:carddemo}
    password: ${CARDDEMO_DB_PASSWORD:carddemo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
