# Tolerance configuration for COBOL-to-Java output comparison
# numeric.tolerance: Maximum allowed difference for numeric fields (0.00 = exact match)
numeric.tolerance=0.00
# rtrim.alphanumeric: Whether to right-trim PIC X fields before comparison
rtrim.alphanumeric=true
# ignore.filler: Whether to skip FILLER bytes entirely
ignore.filler=true
# strip.rdw: Whether to strip 4-byte RDW prefix on variable-length records
strip.rdw=true
# normalize.dates: Compare only YYYYMMDD portion (first 8 meaningful chars)
normalize.dates=true
