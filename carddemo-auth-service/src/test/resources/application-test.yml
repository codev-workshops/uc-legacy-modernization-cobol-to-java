spring:
  application:
    name: carddemo-auth-service
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: localhost
    port: 5672

server:
  port: 0

jwt:
  secret: TestSecretKeyThatIsAtLeast32BytesLongForHS256AlgorithmTesting!!
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info
