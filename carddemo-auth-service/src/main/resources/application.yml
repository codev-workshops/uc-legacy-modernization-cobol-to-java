spring:
  application:
    name: carddemo-auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5441}/${DB_NAME:carddemo_auth_db}
    username: ${DB_USER:carddemo}
    password: ${DB_PASSWORD:carddemo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:ThisIsADefaultSecretKeyForDevelopmentThatIs64BytesLongAtLeast!!}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

logging:
  level:
    com.carddemo: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: staging
  jpa:
    show-sql: false

logging:
  level:
    com.carddemo: INFO

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    com.carddemo: WARN
