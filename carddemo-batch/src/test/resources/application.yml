spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

batch:
  output:
    dir: ${java.io.tmpdir}/carddemo-batch-test
  chunk-size: 5
