spring:
  profiles:
    active: dev
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:carddemo;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

batch:
  output:
    dir: ./output
  chunk-size: 10
