spring.application.name=carddemo-online

# JWT configuration
carddemo.jwt.secret=${CARDDEMO_JWT_SECRET:ThisIsADefaultSecretKeyForDevelopmentOnly32Bytes!}
carddemo.jwt.expiration-ms=${CARDDEMO_JWT_EXPIRATION_MS:3600000}

# JPA (dev profile — H2 by default)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
